# GitHub Actions workflow for TaskDex (Tauri v2 macOS) releases.
#
# Triggered by pushing a version tag (v*). Builds a universal (arm64 + x86_64)
# macOS .dmg via the official tauri-action, code-signed with a Developer ID
# certificate and notarized through the App Store Connect API. tauri-action
# publishes a Release in this repo; the final step mirrors the signed .dmg to
# the central releases repo (roaanv/releases).
#
# Secrets required (always):
#   DEVELOPER_ID_CERTIFICATE_P12       - Base64-encoded Developer ID .p12 certificate
#   DEVELOPER_ID_CERTIFICATE_PASSWORD  - Password for the .p12
#
# Secrets required (App Store Connect API Key notarization):
#   APPSTORE_API_KEY_P8_BASE64  - Base64-encoded .p8 API key
#   APPSTORE_API_KEY_ID         - Key ID
#   APPSTORE_API_ISSUER_ID      - Issuer ID
#
# Secret required (central-repo mirror):
#   RELEASE_REPO_TOKEN  - PAT with `contents: write` on roaanv/releases
#
# All of the above are pushed from the macOS Keychain with `make gh-secrets`.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Opt JS actions into Node 24 ahead of GitHub's forced migration (June 2 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: make setup

      - name: Run tests
        run: make test

  release:
    name: Build & Release
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            package-lock.json

      # Both macOS targets are needed for the universal build.
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: make setup

      # ── Import the Developer ID certificate into a throwaway keychain ──
      # tauri-action signs with the identity found in the default keychain
      # search list, so we import the cert here and read the identity out of it.
      - name: Import code signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "$RUNNER_TEMP/certificate.p12"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Determine signing identity
        run: |
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "Error: No Developer ID Application identity found"
            exit 1
          fi
          echo "Found: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      # ── Decode the App Store Connect API key used for notarization ──
      - name: Prepare notarization API key
        env:
          API_KEY_P8_BASE64: ${{ secrets.APPSTORE_API_KEY_P8_BASE64 }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      # ── Build (universal), sign, notarize, staple, and release in this repo ──
      # Tauri's bundler signs with APPLE_SIGNING_IDENTITY and — because the
      # notarization credentials are present — notarizes and staples the .dmg
      # itself. No manual codesign / notarytool / stapler steps are needed.
      - name: Build, sign, notarize, and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          # App Store Connect API Key notarization:
          APPLE_API_ISSUER: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          # ── Apple ID notarization (alternative) — remove the three API_KEY/
          #    ISSUER lines above and the "Prepare notarization API key" step,
          #    then uncomment these three: ──
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TaskDex ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      # ── Mirror the signed .dmg to the central releases repo ──
      - name: Publish to roaanv/releases
        uses: softprops/action-gh-release@v2
        with:
          repository: roaanv/releases
          token: ${{ secrets.RELEASE_REPO_TOKEN }}
          tag_name: taskdex-${{ github.ref_name }}
          name: taskdex ${{ github.ref_name }}
          generate_release_notes: true
          files: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      # ── Always tear down the signing artifacts ──
      - name: Clean up signing artifacts
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          if [ -n "$APPLE_API_KEY_PATH" ] && [ -f "$APPLE_API_KEY_PATH" ]; then
            rm -f "$APPLE_API_KEY_PATH"
          fi
