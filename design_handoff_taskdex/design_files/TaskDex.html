<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskDex</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #070509; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
  input:focus, textarea:focus { outline: none; }

  /* hover-reveal chrome */
  .td-col-actions { opacity: 0; transition: opacity .15s; }
  div:hover > .td-col-actions, .td-col-actions:hover { opacity: 1; }
  .td-board-del { opacity: 0; transition: opacity .15s; }
  .td-board-row:hover .td-board-del { opacity: 1; }

  /* edit pencils reveal on card hover */
  .td-editbtn { opacity: 0; transition: opacity .15s; }
  .td-card:hover .td-editbtn { opacity: .9; }

  /* hover-reveal menu items */
  .td-menu-item:hover { background: rgba(157,107,255,.12) !important; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: rgba(157,107,255,.28); border-radius: 6px; border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(157,107,255,.45); background-clip: padding-box; border: 3px solid transparent; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::selection { background: rgba(157,107,255,.4); color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="neon-theme.jsx"></script>
<script type="text/babel" src="store.jsx"></script>
<script type="text/babel" src="card.jsx"></script>
<script type="text/babel" src="filters.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="board.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
